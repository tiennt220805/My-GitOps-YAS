apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-elasticsearch
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/tiennt220805/My-GitOps-YAS.git
    targetRevision: HEAD
    path: infrastructure/base/elasticsearch/elasticsearch-cluster
    helm:
      valueFiles:
        - ../../../../environments/dev/values-shared.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
