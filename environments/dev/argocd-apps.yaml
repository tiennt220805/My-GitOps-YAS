apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tiennt220805/My-GitOps-YAS.git
    targetRevision: HEAD
    path: environments/dev/infra-apps
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: cart
          - service: tax
          - service: order
          - service: product
          - service: media
          - service: rating
          - service: customer
          - service: location
          - service: inventory
          - service: search
  template:
    metadata:
      name: yas-dev-{{service}}
      labels:
        app.kubernetes.io/part-of: yas-dev
    spec:
      project: default
      source:
        repoURL: https://github.com/tiennt220805/My-GitOps-YAS.git
        targetRevision: HEAD
        path: charts/{{service}}
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - ../../environments/dev/values-shared.yaml
            - ../../environments/dev/services/{{service}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: yas-dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
