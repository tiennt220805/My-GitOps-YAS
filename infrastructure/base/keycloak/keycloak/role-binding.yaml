apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-operator-cluster-admin-binding
subjects:
- kind: ServiceAccount
  name: keycloak-operator
  namespace: keycloak-operator
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io